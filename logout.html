<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coding Forge - Logged Out</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);padding:20px;}
    .card{background:#1e293b;border:1px solid #334155;border-radius:24px;padding:52px 44px;max-width:440px;width:100%;text-align:center;box-shadow:0 32px 80px rgba(0,0,0,.4);animation:fadeUp .4s ease;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .brand{font-size:18px;font-weight:700;color:#60a5fa;margin-bottom:32px;}
    .icon-wrap{width:90px;height:90px;border-radius:50%;background:rgba(220,38,38,.12);border:2px solid rgba(220,38,38,.25);display:flex;align-items:center;justify-content:center;font-size:42px;margin:0 auto 24px;}
    h1{font-size:26px;font-weight:700;color:#f1f5f9;margin-bottom:10px;}
    .sub{font-size:14px;color:#94a3b8;line-height:1.7;margin-bottom:32px;}
    .summary{background:#0f172a;border-radius:12px;padding:20px;margin-bottom:32px;text-align:left;}
    .summary-title{font-size:11px;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;}
    .summary-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #1e293b;}
    .summary-row:last-child{border-bottom:none;}
    .key{font-size:13px;color:#64748b;}
    .val{font-size:13px;font-weight:600;color:#f1f5f9;}
    .bar-wrap{margin-bottom:28px;}
    .bar-label{font-size:13px;color:#64748b;margin-bottom:10px;}
    .bar-label span{color:#60a5fa;font-weight:600;}
    .bar-track{height:5px;background:#334155;border-radius:4px;overflow:hidden;}
    .bar-fill{height:100%;background:#2563eb;border-radius:4px;width:100%;}
    .btn-login{display:block;width:100%;padding:13px;background:#2563eb;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:.2s;text-decoration:none;margin-bottom:12px;}
    .btn-login:hover{background:#1d4ed8;transform:translateY(-1px);}
    .btn-signup{display:block;width:100%;padding:13px;background:transparent;color:#94a3b8;border:1.5px solid #334155;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;transition:.2s;text-decoration:none;}
    .btn-signup:hover{border-color:#60a5fa;color:#60a5fa;}
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">⚡ Coding Forge</div>
    <div class="icon-wrap">👋</div>
    <h1>You're logged out</h1>
    <p class="sub">Thanks for learning with Coding Forge.<br>Your progress is saved — see you soon!</p>
    <div class="summary">
      <div class="summary-title">Session Summary</div>
      <div class="summary-row"><span class="key">Status</span><span class="val" style="color:#22c55e;">✓ Logged out safely</span></div>
      <div class="summary-row"><span class="key">Token</span><span class="val" style="color:#ef4444;">Cleared</span></div>
      <div class="summary-row"><span class="key">Redirecting in</span><span class="val"><span id="secs">5</span>s</span></div>
    </div>
    <div class="bar-wrap">
      <div class="bar-label">Auto redirect in <span id="secsLabel">5</span> seconds</div>
      <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
    </div>
    <a href="login.html" class="btn-login">🔐 Login Again</a>
    <a href="signup.html" class="btn-signup">✨ Create New Account</a>
  </div>
  <script>
    localStorage.removeItem('token');
    let s = 5;
    const bar = document.getElementById('barFill');
    requestAnimationFrame(() => {
      bar.style.transition = 'width 5s linear';
      bar.style.width = '0%';
    });
    const t = setInterval(() => {
      s--;
      document.getElementById('secs').textContent = s;
      document.getElementById('secsLabel').textContent = s;
      if (s <= 0) { clearInterval(t); window.location.href = 'login.html'; }
    }, 1000);
  </script>
</body>
</html>
